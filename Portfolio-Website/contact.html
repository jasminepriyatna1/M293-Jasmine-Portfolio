<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">PORTFOLIO</a>
            <nav class="nav-links">
                <a href="index.html">About</a>

    </header>

    <section class="section">
        <div class="container grid-2">
            <div>
                <h2 class="section-title" style="margin-bottom: 4rem;">Let's Connect</h2>
                <form class="contact-form" action="mailto:jsmnprytn@gmail.com" method="POST" enctype="text/plain">
                    <div class="form-group">
                        <label>NAME</label>
                        <input type="text" placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label>EMAIL</label>
                        <input type="email" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>SUBJECT</label>
                        <input type="text" placeholder="Project Inquiry">
                    </div>
                    <div class="form-group">
                        <label>MESSAGE</label>
                        <textarea rows="1" placeholder="Tell me about your project..."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">✈ Send message</button>
                </form>
            </div>
            <div class="contact-info" style="padding-top: 4rem; padding-left: 2rem;">
                <h3>CONTACT</h3>
                <p>jsmnprytn@gmail.com</p>
                <p style="color: #666; font-size: 0.9rem;">LOCATION</p>
                <p>St. Gallen, Switzerland</p>
                
                <div class="social-links">
                    <a href="https://www.linkedin.com/in/jasmine-priyatna-b56610310/">🔗 LinkedIn</a>
                    <a href="https://github.com/jasminepriyatna1">🐙 GitHub</a>
                </div>
                
                <p class="status-badge"><span class="dot"></span> Available for Work</p>
                <p style="color: #444; font-size: 0.8rem; margin-top: 0.5rem;">Currently accepting new projects and opportunities.</p>
            </div>
        </div>
    </section>
